<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة نطق المقاطع العربية</title>
    <style>
        :root {
            --bg: #fdf6e3;
            --teacher-btn: #6c5ce7;
            --student-btn: #00b894;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-card {
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
            border: 8px solid #ffeaa7;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .syllables-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
            min-height: 120px;
        }

        .syllable-box {
            font-size: 60px;
            padding: 20px 30px;
            border-radius: 20px;
            color: white;
            min-width: 100px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            background-color: #ff7675;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 18px 45px;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-teacher { background-color: var(--teacher-btn); box-shadow: 0 6px 0 #4834d4; }
        .btn-student { background-color: var(--student-btn); box-shadow: 0 6px 0 #009432; }

        .listening-active {
            animation: pulse 0.8s infinite alternate;
            background-color: #eb4d4b !important;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        #feedback {
            font-size: 35px;
            color: #27ae60;
            margin-top: 20px;
            font-weight: bold;
            height: 50px;
        }

        .thanks-msg {
            font-size: 60px;
            color: var(--teacher-btn);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-card">
    <div id="main-game">
        <div class="header-info">
            <div>الدرجة: <span id="score">0</span></div>
            <div>الكلمة: <span id="word-num">1</span>/4</div>
        </div>

        <div id="syllables-area" class="syllables-container"></div>
        
        <p style="font-size: 22px; color: #636e72;">📖 اقرأ، استمع، وقل، وكرر </p>
        <div id="feedback"></div>

        <div class="btn-group">
            <button class="btn-teacher" onclick="readSyllables()">
                <span>🔊</span> المعلمة
            </button>
            <button class="btn-student" id="btn-record" onclick="startRecognition()">
                <span>🎤</span> تكلم
            </button>
        </div>
    </div>

    <div id="finish-screen" style="display:none;">
        <div class="thanks-msg">شُكراً</div>
        <button class="btn-teacher" style="margin: 30px auto;" onclick="location.reload()">إعادة</button>
    </div>
</div>

<script>
    /**
     * ملاحظة: تم تعديل كلمة "أَمْسِ" برمجياً لتنطقها المعلمة بوضوح (سِي) 
     * مع بقاء الشكل المكتوب (سِ) صحيحاً.
     */
    const wordsData = [
        { display: ["مَـ", "سَـا", "ءٌ"], speak: ["مَـ", "سَـا", "ءٌ"], colors: ["#ff7675", "#fdcb6e", "#e17055"] },
        { display: ["صَـ", "بَـا", "حٌ"], speak: ["صَـ", "بَـا", "حٌ"], colors: ["#6c5ce7", "#a29bfe", "#4834d4"] },
        { display: ["اَلْـ", "يَوْ", "مَ"], speak: ["اَلْـ", "يَوْ", "مَ"], colors: ["#0984e3", "#74b9ff", "#00cec9"] },
        { display: ["أَمْـ", "سِ"], speak: ["أَمْـ", "سِي"], colors: ["#d63031", "#fab1a0"] }
    ];

    let currentIndex = 0;
    let score = 0;

    const syllablesArea = document.getElementById('syllables-area');
    const scoreDisplay = document.getElementById('score');
    const wordNumDisplay = document.getElementById('word-num');
    const feedback = document.getElementById('feedback');
    const btnRecord = document.getElementById('btn-record');
    const mainGame = document.getElementById('main-game');
    const finishScreen = document.getElementById('finish-screen');

    function loadLevel() {
        const data = wordsData[currentIndex];
        syllablesArea.innerHTML = '';
        feedback.innerText = '';
        wordNumDisplay.innerText = currentIndex + 1;

        data.display.forEach((syl, i) => {
            const box = document.createElement('div');
            box.className = 'syllable-box';
            box.innerText = syl;
            box.style.backgroundColor = data.colors[i];
            syllablesArea.appendChild(box);
        });
    }

    async function readSyllables() {
        const sylsToSpeak = wordsData[currentIndex].speak;
        for (let s of sylsToSpeak) {
            await speak(s);
            await new Promise(r => setTimeout(r, 700));
        }
    }

    function speak(text) {
        return new Promise(resolve => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.5; // سرعة هادئة جداً
            utterance.pitch = 1.3; // صوت معلمة
            utterance.onend = resolve;
            window.speechSynthesis.speak(utterance);
        });
    }

    function startRecognition() {
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        if (!SpeechRecognition) return alert("Chrome Only!");

        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA';

        recognition.onstart = () => {
            btnRecord.classList.add('listening-active');
            btnRecord.innerHTML = "<span>👂</span> أسمعك...";
        };

        recognition.onresult = () => {
            handleSuccess();
        };

        recognition.onend = () => {
            btnRecord.classList.remove('listening-active');
            btnRecord.innerHTML = "<span>🎤</span> تكلم";
        };

        recognition.start();
    }

    function handleSuccess() {
        score++;
        scoreDisplay.innerText = score;
        feedback.innerText = "مُمْتَاز ! ✨";
        const congrats = new SpeechSynthesisUtterance("ممتاز");
        congrats.lang = 'ar-SA';
        window.speechSynthesis.speak(congrats);

        setTimeout(() => {
            currentIndex++;
            if (currentIndex < wordsData.length) {
                loadLevel();
            } else {
                mainGame.style.display = 'none';
                finishScreen.style.display = 'block';
            }
        }, 1500);
    }

    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    loadLevel();
</script>

</body>
</html>
